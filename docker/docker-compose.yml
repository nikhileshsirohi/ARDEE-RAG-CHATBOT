# =============================================================================
# Ardee RAG ChatBot — Development Docker Compose
# =============================================================================
# Usage:
#   docker compose -f docker/docker-compose.yml up -d
#
# This file starts all infrastructure dependencies for local development.
# The backend app itself runs outside Docker during development for hot reload.
# =============================================================================
name: ardee-rag
services:
  # ── FastAPI Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: ardee-backend
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      UPLOAD_DIR: backend/storage/uploads/rag
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ../backend/storage/uploads/rag:/app/backend/storage/uploads/rag
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  # ── PostgreSQL + pgvector ──────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ardee-postgres
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ardee_rag}
      POSTGRES_USER: ${POSTGRES_USER:-ardee}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-ardee} -d ${POSTGRES_DB:-ardee_rag}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ardee-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
