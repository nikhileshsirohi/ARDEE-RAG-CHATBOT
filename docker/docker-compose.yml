# =============================================================================
# Ardee RAG ChatBot — Development Docker Compose
# =============================================================================
# Usage:
#   docker compose -f docker/docker-compose.yml up -d
#
# This file starts all infrastructure dependencies for local development.
# The backend app itself runs outside Docker during development for hot reload.
# =============================================================================
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ardee-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ardee-redis
    restart: unless-stopped

    command: redis-server --requirepass ${REDIS_PASSWORD}

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "-a",
          "${REDIS_PASSWORD}",
          "ping"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data: